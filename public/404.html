<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Roteador de fallback do GitHub Pages.
      // Servido para qualquer caminho inexistente sob /pdv-local/.
      //   - /pdv-local/app/<rota>  -> deep link da SPA do app
      //   - /pdv-local/docs/<rota> -> deep link da SPA da documentação
      //   - qualquer outro caminho -> manda para a landing em /pdv-local/.
      (function () {
        var l = window.location;
        var origin =
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
        var siteBase = '/pdv-local';
        var path = l.pathname;

        var areas = [siteBase + '/app', siteBase + '/docs'];
        var area = areas.filter(function (a) {
          return path === a || path.indexOf(a + '/') === 0;
        })[0];

        if (!area) {
          l.replace(origin + siteBase + '/');
          return;
        }

        // Mantém os 2 primeiros segmentos: /pdv-local/app ou /pdv-local/docs
        var segmentsToKeep = 2;
        l.replace(
          origin +
            path
              .split('/')
              .slice(0, 1 + segmentsToKeep)
              .join('/') +
            '/?/' +
            path
              .slice(1)
              .split('/')
              .slice(segmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
