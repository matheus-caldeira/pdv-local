<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Cantina Escoteira</title>
<style>
:root {
  --green-900: #1B4332;
  --green-800: #2D6A4F;
  --green-700: #40916C;
  --green-100: #D8F3DC;
  --amber-500: #F59E0B;
  --amber-400: #FBBF24;
  --amber-100: #FEF3C7;
  --cream: #FEFCE8;
  --red-500: #EF4444;
  --red-100: #FEE2E2;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-900: #111827;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--cream);
  color: var(--gray-900);
  min-height: 100dvh;
  padding-bottom: 72px;
  overflow-x: hidden;
}

.header {
  background: var(--green-900);
  color: white;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header .session-info { font-size: 12px; opacity: 0.7; margin-top: 2px; }

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 1px solid var(--gray-200);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px 10px;
  font-size: 10px;
  color: var(--gray-400);
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-item.active { color: var(--green-900); }
.nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }
.nav-item span { font-weight: 500; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

.card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.15s;
  min-height: 48px;
}
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--green-900); color: white; }
.btn-amber { background: var(--amber-500); color: white; }
.btn-outline { background: white; color: var(--green-900); border: 2px solid var(--green-900); }
.btn-danger { background: var(--red-500); color: white; }
.btn-ghost { background: transparent; color: var(--gray-500); padding: 8px; width: auto; min-height: auto; }
.btn-sm { padding: 10px 14px; font-size: 13px; min-height: 40px; }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.input-group { margin-bottom: 16px; }
.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 6px;
}
.input-group input, .input-group select {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 16px;
  background: white;
  color: var(--gray-900);
  min-height: 48px;
  -webkit-appearance: none;
}
.input-group input:focus, .input-group select:focus {
  outline: none;
  border-color: var(--green-700);
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-open { background: var(--amber-100); color: #92400E; }
.badge-paid { background: var(--green-100); color: var(--green-900); }
.badge-pending { background: var(--red-100); color: #991B1B; }

.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 12px 0;
}
.product-btn {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.product-btn:active { border-color: var(--green-700); background: var(--green-100); }
.product-btn .name { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.product-btn .price { font-size: 15px; font-weight: 700; color: var(--green-900); margin-top: 2px; }

.order-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--gray-100);
}
.order-item:last-child { border-bottom: none; }
.order-item .qty-controls { display: flex; align-items: center; gap: 12px; }
.order-item .qty-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--gray-200);
  background: white;
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-700);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.order-item .qty-btn:active { background: var(--gray-100); }
.order-item .qty { font-size: 16px; font-weight: 700; min-width: 24px; text-align: center; }

.total-bar {
  position: fixed;
  bottom: 64px;
  left: 0;
  right: 0;
  background: var(--green-900);
  color: white;
  padding: 14px 20px;
  display: none;
  align-items: center;
  justify-content: space-between;
  z-index: 90;
}
.total-bar .total-amount { font-size: 20px; font-weight: 800; }
.total-bar .total-label { font-size: 13px; opacity: 0.8; }
.total-bar .finish-btn {
  background: var(--amber-500);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.payment-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 16px 0;
}
.payment-option {
  padding: 16px 12px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.payment-option:active, .payment-option.selected {
  border-color: var(--green-700);
  background: var(--green-100);
}
.payment-option .pay-icon { font-size: 24px; }
.payment-option .pay-label { font-size: 13px; font-weight: 600; }
.payment-option.pay-later { grid-column: 1 / -1; }

.order-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.order-card:active { background: var(--gray-50); }
.order-card .order-info h3 { font-size: 15px; font-weight: 700; }
.order-card .order-info p { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.order-card .order-right { text-align: right; }
.order-card .order-right .amount { font-size: 16px; font-weight: 800; color: var(--green-900); }

.report-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.report-stat {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.report-stat .stat-value { font-size: 20px; font-weight: 800; color: var(--green-900); }
.report-stat .stat-label { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.report-stat.full { grid-column: 1 / -1; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 85dvh;
  overflow-y: auto;
  padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--green-900);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.empty-state p { font-size: 14px; }

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  margin-top: 20px;
}
.section-title:first-child { margin-top: 0; }

.session-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
}
.session-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 2px solid var(--gray-200);
  background: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.session-pill.active { background: var(--green-900); color: white; border-color: var(--green-900); }

.flex-between { display: flex; justify-content: space-between; align-items: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.fw-700 { font-weight: 700; }
.text-sm { font-size: 13px; }
.text-muted { color: var(--gray-500); }
.d-flex { display: flex; }
.gap-8 { gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Cantina Escoteira</h1>
  <div class="session-info" id="headerSession"></div>
</div>

<div class="toast" id="toast"></div>

<!-- PAGE: Pedidos -->
<div class="page active" id="page-orders">
  <div class="flex-between mb-16">
    <h2 style="font-size:20px;font-weight:800">Pedidos</h2>
    <button class="btn btn-primary btn-sm" id="btnNewOrder" style="width:auto">+ Novo</button>
  </div>
  <div id="ordersList"></div>
</div>

<!-- PAGE: Novo Pedido -->
<div class="page" id="page-new-order">
  <div class="flex-between mb-16">
    <h2 style="font-size:20px;font-weight:800" id="orderPageTitle">Novo Pedido</h2>
    <button class="btn btn-ghost" id="btnCancelOrder">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="card">
    <div class="input-group" style="margin-bottom:12px">
      <label>Comanda</label>
      <input type="number" id="orderComanda" placeholder="N da comanda" inputmode="numeric">
    </div>
    <div class="input-group" style="margin-bottom:0">
      <label>Responsavel</label>
      <input type="text" id="orderResponsavel" placeholder="Nome do responsavel" autocomplete="off">
    </div>
  </div>
  <div class="section-title">Adicionar Itens</div>
  <div class="product-grid" id="productGrid"></div>
  <div class="section-title">Itens do Pedido</div>
  <div class="card" id="orderItemsCard" style="display:none">
    <div id="orderItemsList"></div>
  </div>
  <div id="orderItemsEmpty" class="empty-state"><p>Toque nos produtos acima para adicionar</p></div>
</div>

<div class="total-bar" id="totalBar">
  <div>
    <div class="total-label">Total</div>
    <div class="total-amount" id="totalAmount">R$ 0,00</div>
  </div>
  <button class="finish-btn" id="btnFinishOrder">Fechar Pedido</button>
</div>

<!-- PAGE: Produtos -->
<div class="page" id="page-products">
  <div class="flex-between mb-16">
    <h2 style="font-size:20px;font-weight:800">Produtos</h2>
    <button class="btn btn-primary btn-sm" id="btnNewProduct" style="width:auto">+ Novo</button>
  </div>
  <div id="productsList"></div>
</div>

<!-- PAGE: Relatorios -->
<div class="page" id="page-reports">
  <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">Relatorios</h2>
  <div class="section-title" style="margin-top:0">Sessao</div>
  <div class="session-pills" id="reportSessions"></div>
  <div id="reportContent"></div>
</div>

<!-- PAGE: Caixa -->
<div class="page" id="page-cash">
  <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">Caixa</h2>
  <div class="card">
    <div class="section-title" style="margin-top:0">Sessao de Hoje</div>
    <p class="text-sm text-muted mb-8" id="cashSessionDate"></p>
    <div class="input-group">
      <label>Dinheiro Inicial (R$)</label>
      <input type="number" id="cashInitial" placeholder="0,00" inputmode="decimal" step="0.01">
    </div>
    <button class="btn btn-primary" id="btnSaveCash">Salvar</button>
  </div>
  <div class="card mt-16" id="cashSummaryCard" style="display:none">
    <div class="section-title" style="margin-top:0">Resumo do Caixa</div>
    <div id="cashSummary"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" data-page="orders">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    <span>Pedidos</span>
  </button>
  <button class="nav-item" data-page="products">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1"/></svg>
    <span>Produtos</span>
  </button>
  <button class="nav-item" data-page="cash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    <span>Caixa</span>
  </button>
  <button class="nav-item" data-page="reports">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    <span>Relatorio</span>
  </button>
</nav>

<!-- MODAL: Payment -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Forma de Pagamento</h2>
    <div style="text-align:center" class="mb-16">
      <span style="font-size:28px;font-weight:800;color:var(--green-900)" id="paymentTotal"></span>
    </div>
    <div class="payment-grid" id="paymentGrid">
      <div class="payment-option" data-method="pix">
        <div class="pay-icon">P</div>
        <div class="pay-label">PIX</div>
      </div>
      <div class="payment-option" data-method="credito">
        <div class="pay-icon">C</div>
        <div class="pay-label">Credito</div>
      </div>
      <div class="payment-option" data-method="debito">
        <div class="pay-icon">D</div>
        <div class="pay-label">Debito</div>
      </div>
      <div class="payment-option" data-method="dinheiro">
        <div class="pay-icon">$</div>
        <div class="pay-label">Dinheiro</div>
      </div>
      <div class="payment-option pay-later" data-method="pagar_depois">
        <div class="pay-label">Pagar Depois</div>
      </div>
    </div>
    <button class="btn btn-primary mt-16" id="confirmPaymentBtn" disabled>Confirmar Pagamento</button>
    <button class="btn btn-ghost mt-8" id="cancelPaymentBtn" style="width:100%;text-align:center">Cancelar</button>
  </div>
</div>

<!-- MODAL: Product -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="productModalTitle">Novo Produto</h2>
    <div class="input-group">
      <label>Nome do Produto</label>
      <input type="text" id="productName" placeholder="Ex: Cachorro-quente" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Preco (R$)</label>
      <input type="number" id="productPrice" placeholder="0,00" inputmode="decimal" step="0.01">
    </div>
    <input type="hidden" id="productEditId">
    <button class="btn btn-primary" id="btnSaveProduct">Salvar</button>
    <button class="btn btn-ghost mt-8" id="cancelProductBtn" style="width:100%;text-align:center">Cancelar</button>
  </div>
</div>

<!-- MODAL: Order Detail -->
<div class="modal-overlay" id="orderDetailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="orderDetailContent"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===================== IndexedDB =====================
  const DB_NAME = 'cantina_escoteira';
  const DB_VERSION = 1;
  let db;

  function openDB() {
    return new Promise(function(resolve, reject) {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e) {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('products')) {
          d.createObjectStore('products', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('orders')) {
          const os = d.createObjectStore('orders', { keyPath: 'id' });
          os.createIndex('session', 'session', { unique: false });
        }
        if (!d.objectStoreNames.contains('sessions')) {
          d.createObjectStore('sessions', { keyPath: 'date' });
        }
      };
      req.onsuccess = function(e) { db = e.target.result; resolve(db); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }

  function dbTx(store, mode) {
    return db.transaction(store, mode).objectStore(store);
  }

  function dbAll(store) {
    return new Promise(function(resolve, reject) {
      const req = dbTx(store, 'readonly').getAll();
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function dbGet(store, key) {
    return new Promise(function(resolve, reject) {
      const req = dbTx(store, 'readonly').get(key);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function dbPut(store, data) {
    return new Promise(function(resolve, reject) {
      const req = dbTx(store, 'readwrite').put(data);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function dbDelete(store, key) {
    return new Promise(function(resolve, reject) {
      const req = dbTx(store, 'readwrite').delete(key);
      req.onsuccess = function() { resolve(); };
      req.onerror = function() { reject(req.error); };
    });
  }

  // ===================== Helpers =====================
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatDate(str) {
    const parts = str.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function formatMoney(v) {
    return 'R$ ' + Number(v).toFixed(2).replace('.', ',');
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  // Safe text content setter - avoids innerHTML for untrusted data
  function setText(el, text) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (el) el.textContent = text;
  }

  // Safe element creation
  function createElement(tag, attrs, children) {
    const el = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(key) {
        if (key === 'className') el.className = attrs[key];
        else if (key === 'style' && typeof attrs[key] === 'object') {
          Object.assign(el.style, attrs[key]);
        } else if (key.startsWith('on')) {
          el.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
        } else el.setAttribute(key, attrs[key]);
      });
    }
    if (children) {
      if (typeof children === 'string') el.textContent = children;
      else if (Array.isArray(children)) children.forEach(function(c) { if (c) el.appendChild(c); });
      else el.appendChild(children);
    }
    return el;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }

  var PAYMENT_LABELS = {
    pix: 'PIX', credito: 'Credito', debito: 'Debito',
    dinheiro: 'Dinheiro', pagar_depois: 'Pagar Depois'
  };

  function paymentLabel(m) {
    return PAYMENT_LABELS[m] || 'Aberto';
  }

  // ===================== Navigation =====================
  var navItems = document.querySelectorAll('.nav-item');
  var pages = document.querySelectorAll('.page');

  function navigateTo(pageName) {
    pages.forEach(function(p) { p.classList.remove('active'); });
    navItems.forEach(function(n) { n.classList.remove('active'); });
    document.getElementById('page-' + pageName).classList.add('active');
    var navEl = document.querySelector('[data-page="' + pageName + '"]');
    if (navEl) navEl.classList.add('active');

    var totalBar = document.getElementById('totalBar');
    totalBar.style.display = (pageName === 'new-order' && currentOrderItems.length > 0) ? 'flex' : 'none';

    if (pageName === 'orders') loadOrders();
    if (pageName === 'products') loadProducts();
    if (pageName === 'reports') loadReports();
    if (pageName === 'cash') loadCash();
  }

  navItems.forEach(function(item) {
    item.addEventListener('click', function() { navigateTo(item.dataset.page); });
  });

  // ===================== Sessions =====================
  async function ensureSession() {
    var today = todayStr();
    var session = await dbGet('sessions', today);
    if (!session) {
      session = { date: today, cashInitial: 0 };
      await dbPut('sessions', session);
    }
    setText('headerSession', formatDate(today));
    return session;
  }

  // ===================== Products =====================
  async function loadProducts() {
    var products = await dbAll('products');
    var container = document.getElementById('productsList');
    container.replaceChildren();

    if (products.length === 0) {
      var empty = createElement('div', { className: 'empty-state' },
        createElement('p', null, 'Nenhum produto cadastrado'));
      container.appendChild(empty);
      return;
    }

    products.forEach(function(p) {
      var card = createElement('div', { className: 'card flex-between' }, [
        createElement('div', null, [
          createElement('div', { className: 'fw-700' }, p.name),
          createElement('div', { className: 'text-sm text-muted' }, formatMoney(p.price))
        ]),
        createElement('div', { className: 'd-flex gap-8' }, [
          createElement('button', { className: 'btn btn-ghost', onClick: function() { editProduct(p.id); } },
            createSvgEdit()),
          createElement('button', { className: 'btn btn-ghost', style: { color: 'var(--red-500)' }, onClick: function() { deleteProduct(p.id); } },
            createSvgTrash())
        ])
      ]);
      container.appendChild(card);
    });
  }

  function createSvgEdit() {
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '20'); svg.setAttribute('height', '20');
    svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2');
    var p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p1.setAttribute('d', 'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7');
    var p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p2.setAttribute('d', 'M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z');
    svg.appendChild(p1); svg.appendChild(p2);
    return svg;
  }

  function createSvgTrash() {
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '20'); svg.setAttribute('height', '20');
    svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2');
    var p1 = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    p1.setAttribute('points', '3 6 5 6 21 6');
    var p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p2.setAttribute('d', 'M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2');
    svg.appendChild(p1); svg.appendChild(p2);
    return svg;
  }

  function openProductModal(id) {
    document.getElementById('productEditId').value = id || '';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    setText('productModalTitle', id ? 'Editar Produto' : 'Novo Produto');
    if (id) {
      dbGet('products', id).then(function(p) {
        document.getElementById('productName').value = p.name;
        document.getElementById('productPrice').value = p.price;
      });
    }
    openModal('productModal');
  }

  function editProduct(id) { openProductModal(id); }

  async function deleteProduct(id) {
    if (confirm('Remover este produto?')) {
      await dbDelete('products', id);
      loadProducts();
      showToast('Produto removido');
    }
  }

  async function saveProduct() {
    var name = document.getElementById('productName').value.trim();
    var price = parseFloat(document.getElementById('productPrice').value);
    if (!name || isNaN(price) || price <= 0) {
      showToast('Preencha nome e preco');
      return;
    }
    var editId = document.getElementById('productEditId').value;
    await dbPut('products', { id: editId || genId(), name: name, price: price });
    closeModal('productModal');
    loadProducts();
    showToast(editId ? 'Produto atualizado' : 'Produto criado');
  }

  // ===================== Orders =====================
  var currentOrderItems = [];
  var editingOrderId = null;
  var selectedPayment = null;
  var pendingPayHandler = null;

  async function loadOrders() {
    var today = todayStr();
    var allOrders = await dbAll('orders');
    var orders = allOrders.filter(function(o) { return o.session === today; })
      .sort(function(a, b) { return b.createdAt - a.createdAt; });

    var container = document.getElementById('ordersList');
    container.replaceChildren();

    if (orders.length === 0) {
      container.appendChild(createElement('div', { className: 'empty-state' },
        createElement('p', null, 'Nenhum pedido hoje')));
      return;
    }

    orders.forEach(function(o) {
      var isPending = o.paymentMethod === 'pagar_depois';
      var statusClass = isPending ? 'badge-pending' : (o.paymentMethod ? 'badge-paid' : 'badge-open');
      var statusText = isPending ? 'Pendente' : (o.paymentMethod ? 'Pago' : 'Aberto');

      var card = createElement('div', { className: 'order-card', onClick: function() { openOrderDetail(o.id); } }, [
        createElement('div', { className: 'order-info' }, [
          createElement('h3', null, '#' + o.comanda + ' - ' + o.responsavel),
          createElement('p', null, o.items.length + (o.items.length === 1 ? ' item' : ' itens') + ' \u00B7 ' + paymentLabel(o.paymentMethod))
        ]),
        createElement('div', { className: 'order-right' }, [
          createElement('div', { className: 'amount' }, formatMoney(o.total)),
          createElement('span', { className: 'badge ' + statusClass, style: { marginTop: '4px' } }, statusText)
        ])
      ]);
      container.appendChild(card);
    });
  }

  async function openNewOrder() {
    editingOrderId = null;
    currentOrderItems = [];
    selectedPayment = null;
    document.getElementById('orderComanda').value = '';
    document.getElementById('orderResponsavel').value = '';
    setText('orderPageTitle', 'Novo Pedido');
    renderOrderItems();
    await renderProductGrid();

    pages.forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-new-order').classList.add('active');
    navItems.forEach(function(n) { n.classList.remove('active'); });
  }

  async function renderProductGrid() {
    var products = await dbAll('products');
    var grid = document.getElementById('productGrid');
    grid.replaceChildren();

    if (products.length === 0) {
      grid.appendChild(createElement('div', {
        className: 'text-sm text-muted',
        style: { gridColumn: '1/-1', textAlign: 'center', padding: '20px' }
      }, 'Cadastre produtos primeiro'));
      return;
    }

    products.forEach(function(p) {
      var btn = createElement('div', { className: 'product-btn', onClick: function() { addItemToOrder(p.id, p.name, p.price); } }, [
        createElement('div', { className: 'name' }, p.name),
        createElement('div', { className: 'price' }, formatMoney(p.price))
      ]);
      grid.appendChild(btn);
    });
  }

  function addItemToOrder(productId, name, price) {
    var existing = currentOrderItems.find(function(i) { return i.productId === productId; });
    if (existing) {
      existing.qty++;
    } else {
      currentOrderItems.push({ productId: productId, name: name, price: price, qty: 1 });
    }
    renderOrderItems();
  }

  function changeQty(productId, delta) {
    var item = currentOrderItems.find(function(i) { return i.productId === productId; });
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      currentOrderItems = currentOrderItems.filter(function(i) { return i.productId !== productId; });
    }
    renderOrderItems();
  }

  function renderOrderItems() {
    var list = document.getElementById('orderItemsList');
    var card = document.getElementById('orderItemsCard');
    var empty = document.getElementById('orderItemsEmpty');
    var totalBar = document.getElementById('totalBar');

    if (currentOrderItems.length === 0) {
      card.style.display = 'none';
      empty.style.display = 'block';
      totalBar.style.display = 'none';
      return;
    }

    card.style.display = 'block';
    empty.style.display = 'none';
    totalBar.style.display = 'flex';

    var total = currentOrderItems.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
    setText('totalAmount', formatMoney(total));

    list.replaceChildren();
    currentOrderItems.forEach(function(i) {
      var row = createElement('div', { className: 'order-item' }, [
        createElement('div', null, [
          createElement('div', { className: 'fw-700 text-sm' }, i.name),
          createElement('div', { className: 'text-sm text-muted' }, formatMoney(i.price) + ' un.')
        ]),
        createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
          createElement('div', { className: 'text-sm text-muted' }, formatMoney(i.price * i.qty)),
          createElement('div', { className: 'qty-controls' }, [
            createElement('button', { className: 'qty-btn', onClick: function() { changeQty(i.productId, -1); } }, '\u2212'),
            createElement('span', { className: 'qty' }, String(i.qty)),
            createElement('button', { className: 'qty-btn', onClick: function() { changeQty(i.productId, 1); } }, '+')
          ])
        ])
      ]);
      list.appendChild(row);
    });
  }

  function cancelOrder() {
    currentOrderItems = [];
    document.getElementById('totalBar').style.display = 'none';
    navigateTo('orders');
  }

  function openPayment() {
    var comanda = document.getElementById('orderComanda').value.trim();
    var resp = document.getElementById('orderResponsavel').value.trim();
    if (!comanda || !resp) {
      showToast('Preencha comanda e responsavel');
      return;
    }
    var total = currentOrderItems.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
    setText('paymentTotal', formatMoney(total));
    selectedPayment = null;
    document.querySelectorAll('.payment-option').forEach(function(el) { el.classList.remove('selected'); });
    document.getElementById('confirmPaymentBtn').disabled = true;

    // Reset handler to default
    pendingPayHandler = null;

    openModal('paymentModal');
  }

  // Payment option selection
  document.querySelectorAll('.payment-option').forEach(function(el) {
    el.addEventListener('click', function() {
      document.querySelectorAll('.payment-option').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
      selectedPayment = el.dataset.method;
      document.getElementById('confirmPaymentBtn').disabled = false;
    });
  });

  async function confirmPayment() {
    if (pendingPayHandler) {
      await pendingPayHandler();
      return;
    }

    var comanda = document.getElementById('orderComanda').value.trim();
    var responsavel = document.getElementById('orderResponsavel').value.trim();
    var total = currentOrderItems.reduce(function(s, i) { return s + i.price * i.qty; }, 0);

    var existingOrder = editingOrderId ? await dbGet('orders', editingOrderId) : null;

    var order = {
      id: editingOrderId || genId(),
      comanda: comanda,
      responsavel: responsavel,
      items: currentOrderItems.map(function(i) { return { productId: i.productId, name: i.name, price: i.price, qty: i.qty }; }),
      total: total,
      paymentMethod: selectedPayment,
      session: todayStr(),
      createdAt: existingOrder ? existingOrder.createdAt : Date.now(),
      updatedAt: Date.now()
    };

    await dbPut('orders', order);
    closeModal('paymentModal');
    document.getElementById('totalBar').style.display = 'none';
    currentOrderItems = [];
    editingOrderId = null;
    navigateTo('orders');
    showToast('Pedido salvo');
  }

  document.getElementById('confirmPaymentBtn').addEventListener('click', confirmPayment);

  async function openOrderDetail(id) {
    var order = await dbGet('orders', id);
    if (!order) return;

    var isPending = order.paymentMethod === 'pagar_depois';
    var statusClass = isPending ? 'badge-pending' : (order.paymentMethod ? 'badge-paid' : 'badge-open');
    var statusText = isPending ? 'Pendente' : (order.paymentMethod ? 'Pago' : 'Aberto');

    var content = document.getElementById('orderDetailContent');
    content.replaceChildren();

    var children = [
      createElement('h2', null, 'Comanda #' + order.comanda),
      createElement('div', { className: 'flex-between mb-16' }, [
        createElement('div', null, [
          createElement('div', { className: 'fw-700' }, order.responsavel),
          createElement('div', { className: 'text-sm text-muted' }, formatDate(order.session))
        ]),
        createElement('span', { className: 'badge ' + statusClass }, statusText)
      ]),
      createElement('div', { className: 'section-title' }, 'Itens')
    ];

    // Items card
    var itemsDiv = createElement('div', { className: 'card' });
    order.items.forEach(function(i) {
      var row = createElement('div', { className: 'flex-between', style: { padding: '6px 0' } }, [
        createElement('span', { className: 'text-sm' }, i.qty + 'x ' + i.name),
        createElement('span', { className: 'text-sm fw-700' }, formatMoney(i.price * i.qty))
      ]);
      itemsDiv.appendChild(row);
    });
    var totalRow = createElement('div', { className: 'flex-between', style: { padding: '10px 0 0', borderTop: '2px solid var(--gray-200)', marginTop: '8px' } }, [
      createElement('span', { className: 'fw-700' }, 'Total'),
      createElement('span', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green-900)' } }, formatMoney(order.total))
    ]);
    itemsDiv.appendChild(totalRow);
    children.push(itemsDiv);

    children.push(createElement('div', { className: 'text-sm text-muted mb-16' }, 'Pagamento: ' + paymentLabel(order.paymentMethod)));

    if (isPending) {
      children.push(createElement('button', { className: 'btn btn-primary mb-8', onClick: function() { payPendingOrder(order.id); } }, 'Registrar Pagamento'));
    }

    children.push(createElement('button', { className: 'btn btn-outline', onClick: function() { editExistingOrder(order.id); } }, 'Editar Pedido'));
    children.push(createElement('button', { className: 'btn btn-danger mt-8', onClick: function() { deleteOrder(order.id); } }, 'Excluir Pedido'));
    children.push(createElement('button', { className: 'btn btn-ghost mt-8', style: { width: '100%', textAlign: 'center' }, onClick: function() { closeModal('orderDetailModal'); } }, 'Fechar'));

    children.forEach(function(c) { content.appendChild(c); });
    openModal('orderDetailModal');
  }

  async function payPendingOrder(id) {
    closeModal('orderDetailModal');
    var order = await dbGet('orders', id);
    setText('paymentTotal', formatMoney(order.total));
    selectedPayment = null;
    document.querySelectorAll('.payment-option').forEach(function(el) { el.classList.remove('selected'); });
    document.getElementById('confirmPaymentBtn').disabled = true;

    pendingPayHandler = async function() {
      order.paymentMethod = selectedPayment;
      order.updatedAt = Date.now();
      await dbPut('orders', order);
      closeModal('paymentModal');
      pendingPayHandler = null;
      currentOrderItems = [];
      editingOrderId = null;
      document.getElementById('totalBar').style.display = 'none';
      navigateTo('orders');
      showToast('Pagamento registrado');
    };

    openModal('paymentModal');
  }

  async function editExistingOrder(id) {
    closeModal('orderDetailModal');
    var order = await dbGet('orders', id);
    editingOrderId = id;
    currentOrderItems = order.items.map(function(i) { return { productId: i.productId, name: i.name, price: i.price, qty: i.qty }; });
    document.getElementById('orderComanda').value = order.comanda;
    document.getElementById('orderResponsavel').value = order.responsavel;
    setText('orderPageTitle', 'Editar Pedido');
    renderOrderItems();
    await renderProductGrid();

    pages.forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-new-order').classList.add('active');
    navItems.forEach(function(n) { n.classList.remove('active'); });
  }

  async function deleteOrder(id) {
    if (confirm('Excluir este pedido?')) {
      await dbDelete('orders', id);
      closeModal('orderDetailModal');
      navigateTo('orders');
      showToast('Pedido excluido');
    }
  }

  // ===================== Cash =====================
  async function loadCash() {
    var session = await ensureSession();
    setText('cashSessionDate', formatDate(session.date));
    document.getElementById('cashInitial').value = session.cashInitial || '';

    var allOrders = await dbAll('orders');
    var todayOrders = allOrders.filter(function(o) { return o.session === todayStr(); });
    var cashTotal = todayOrders.filter(function(o) { return o.paymentMethod === 'dinheiro'; })
      .reduce(function(s, o) { return s + o.total; }, 0);
    var pendingTotal = todayOrders.filter(function(o) { return o.paymentMethod === 'pagar_depois'; })
      .reduce(function(s, o) { return s + o.total; }, 0);

    var summaryCard = document.getElementById('cashSummaryCard');
    var summaryDiv = document.getElementById('cashSummary');

    if (todayOrders.length > 0) {
      summaryCard.style.display = 'block';
      summaryDiv.replaceChildren();

      var rows = [
        ['Dinheiro inicial', formatMoney(session.cashInitial || 0), null],
        ['Vendas em dinheiro', '+ ' + formatMoney(cashTotal), 'var(--green-800)'],
        ['Pendentes', formatMoney(pendingTotal), 'var(--red-500)']
      ];

      rows.forEach(function(r) {
        var val = createElement('span', { className: 'fw-700' }, r[1]);
        if (r[2]) val.style.color = r[2];
        summaryDiv.appendChild(createElement('div', { className: 'flex-between', style: { padding: '6px 0' } }, [
          createElement('span', { className: 'text-sm' }, r[0]),
          val
        ]));
      });

      var totalRow = createElement('div', { className: 'flex-between', style: { padding: '10px 0 0', borderTop: '2px solid var(--gray-200)', marginTop: '8px' } }, [
        createElement('span', { className: 'fw-700' }, 'Esperado no caixa'),
        createElement('span', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green-900)' } }, formatMoney((session.cashInitial || 0) + cashTotal))
      ]);
      summaryDiv.appendChild(totalRow);
    } else {
      summaryCard.style.display = 'none';
    }
  }

  async function saveCashInitial() {
    var val = parseFloat(document.getElementById('cashInitial').value) || 0;
    var session = await ensureSession();
    session.cashInitial = val;
    await dbPut('sessions', session);
    showToast('Dinheiro inicial salvo');
    loadCash();
  }

  // ===================== Reports =====================
  async function loadReports() {
    var sessions = await dbAll('sessions');
    var container = document.getElementById('reportSessions');
    container.replaceChildren();

    if (sessions.length === 0) {
      container.appendChild(createElement('span', { className: 'text-sm text-muted' }, 'Nenhuma sessao'));
      document.getElementById('reportContent').replaceChildren();
      return;
    }

    var sorted = sessions.sort(function(a, b) { return b.date.localeCompare(a.date); });
    var activeSession = sorted[0].date;

    sorted.forEach(function(s) {
      var pill = createElement('button', {
        className: 'session-pill' + (s.date === activeSession ? ' active' : ''),
        onClick: function() { selectReportSession(s.date); }
      }, formatDate(s.date));
      pill.dataset.sessionDate = s.date;
      container.appendChild(pill);
    });

    renderReport(activeSession);
  }

  function selectReportSession(date) {
    document.querySelectorAll('.session-pill').forEach(function(p) { p.classList.remove('active'); });
    var target = document.querySelector('.session-pill[data-session-date="' + date + '"]');
    if (target) target.classList.add('active');
    renderReport(date);
  }

  async function renderReport(sessionDate) {
    var allOrders = await dbAll('orders');
    var orders = allOrders.filter(function(o) { return o.session === sessionDate; });
    var content = document.getElementById('reportContent');
    content.replaceChildren();

    if (orders.length === 0) {
      content.appendChild(createElement('div', { className: 'empty-state' },
        createElement('p', null, 'Nenhum pedido nesta sessao')));
      return;
    }

    var totalGeral = orders.reduce(function(s, o) { return s + o.total; }, 0);
    var methods = ['pix', 'credito', 'debito', 'dinheiro', 'pagar_depois'];
    var byMethod = {};
    methods.forEach(function(m) {
      byMethod[m] = orders.filter(function(o) { return o.paymentMethod === m; })
        .reduce(function(s, o) { return s + o.total; }, 0);
    });
    var paidTotal = totalGeral - (byMethod.pagar_depois || 0);

    // Summary cards
    var summary = createElement('div', { className: 'report-summary' }, [
      createElement('div', { className: 'report-stat full' }, [
        createElement('div', { className: 'stat-value' }, formatMoney(totalGeral)),
        createElement('div', { className: 'stat-label' }, 'Total Geral')
      ]),
      createElement('div', { className: 'report-stat' }, [
        createElement('div', { className: 'stat-value' }, String(orders.length)),
        createElement('div', { className: 'stat-label' }, 'Pedidos')
      ]),
      createElement('div', { className: 'report-stat' }, [
        createElement('div', { className: 'stat-value' }, formatMoney(paidTotal)),
        createElement('div', { className: 'stat-label' }, 'Recebido')
      ])
    ]);
    content.appendChild(summary);

    // By payment method
    content.appendChild(createElement('div', { className: 'section-title' }, 'Por Forma de Pagamento'));
    var methodCard = createElement('div', { className: 'card' });
    methods.forEach(function(m) {
      methodCard.appendChild(createElement('div', { className: 'flex-between', style: { padding: '6px 0' } }, [
        createElement('span', { className: 'text-sm' }, paymentLabel(m)),
        createElement('span', { className: 'fw-700 text-sm' }, formatMoney(byMethod[m]))
      ]));
    });
    content.appendChild(methodCard);

    // Copy button
    var copyBtn = createElement('button', { className: 'btn btn-amber mb-16', onClick: function() { copyReport(sessionDate); } }, 'Copiar Resumo (WhatsApp)');
    content.appendChild(copyBtn);

    // All orders
    content.appendChild(createElement('div', { className: 'section-title' }, 'Todos os Pedidos'));
    orders.sort(function(a, b) { return b.createdAt - a.createdAt; }).forEach(function(o) {
      var isPending = o.paymentMethod === 'pagar_depois';
      var sc = isPending ? 'badge-pending' : 'badge-paid';
      var st = isPending ? 'Pendente' : 'Pago';

      var card = createElement('div', { className: 'order-card', onClick: function() { openOrderDetail(o.id); } }, [
        createElement('div', { className: 'order-info' }, [
          createElement('h3', null, '#' + o.comanda + ' - ' + o.responsavel),
          createElement('p', null, paymentLabel(o.paymentMethod))
        ]),
        createElement('div', { className: 'order-right' }, [
          createElement('div', { className: 'amount' }, formatMoney(o.total)),
          createElement('span', { className: 'badge ' + sc, style: { marginTop: '4px' } }, st)
        ])
      ]);
      content.appendChild(card);
    });
  }

  async function copyReport(sessionDate) {
    var allOrders = await dbAll('orders');
    var orders = allOrders.filter(function(o) { return o.session === sessionDate; });
    var session = await dbGet('sessions', sessionDate);

    var totalGeral = orders.reduce(function(s, o) { return s + o.total; }, 0);
    var methods = ['pix', 'credito', 'debito', 'dinheiro', 'pagar_depois'];
    var byMethod = {};
    methods.forEach(function(m) {
      byMethod[m] = orders.filter(function(o) { return o.paymentMethod === m; })
        .reduce(function(s, o) { return s + o.total; }, 0);
    });

    var pendingOrders = orders.filter(function(o) { return o.paymentMethod === 'pagar_depois'; });
    var unpaidTotal = byMethod.pagar_depois || 0;

    var text = '*CANTINA ESCOTEIRA*\n';
    text += formatDate(sessionDate) + '\n\n';
    text += '*Total de pedidos:* ' + orders.length + '\n';
    text += '*Total geral:* ' + formatMoney(totalGeral) + '\n\n';
    text += '*Por forma de pagamento:*\n';
    methods.forEach(function(m) {
      if (byMethod[m] > 0) {
        text += '  ' + paymentLabel(m) + ': ' + formatMoney(byMethod[m]) + '\n';
      }
    });
    text += '\n*Total nao pago:* ' + formatMoney(unpaidTotal) + '\n';

    if (pendingOrders.length > 0) {
      text += '\n*Pedidos pendentes:*\n';
      pendingOrders.forEach(function(o) {
        text += '  #' + o.comanda + ' - ' + o.responsavel + ' - ' + formatMoney(o.total) + ' - ' + formatDate(o.session) + '\n';
      });
    }

    if (session && session.cashInitial) {
      var cashSales = byMethod.dinheiro || 0;
      text += '\n*Caixa:*\n';
      text += '  Dinheiro inicial: ' + formatMoney(session.cashInitial) + '\n';
      text += '  Vendas dinheiro: ' + formatMoney(cashSales) + '\n';
      text += '  Esperado: ' + formatMoney(session.cashInitial + cashSales) + '\n';
    }

    try {
      await navigator.clipboard.writeText(text);
      showToast('Resumo copiado!');
    } catch (e) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Resumo copiado!');
    }
  }

  // ===================== Event Bindings =====================
  document.getElementById('btnNewOrder').addEventListener('click', openNewOrder);
  document.getElementById('btnCancelOrder').addEventListener('click', cancelOrder);
  document.getElementById('btnFinishOrder').addEventListener('click', openPayment);
  document.getElementById('btnNewProduct').addEventListener('click', function() { openProductModal(); });
  document.getElementById('btnSaveProduct').addEventListener('click', saveProduct);
  document.getElementById('btnSaveCash').addEventListener('click', saveCashInitial);
  document.getElementById('cancelPaymentBtn').addEventListener('click', function() { closeModal('paymentModal'); });
  document.getElementById('cancelProductBtn').addEventListener('click', function() { closeModal('productModal'); });

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  // ===================== Init =====================
  async function init() {
    await openDB();
    await ensureSession();
    loadOrders();
  }

  init();
})();
</script>
</body>
</html>
